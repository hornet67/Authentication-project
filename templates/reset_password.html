{% extends 'base.html' %}
{% load static %}

{% block title %} Reset Password {% endblock title %}

{% block extra_css %}
<link href="{% static 'css/style.css' %}" rel="stylesheet" />
{% endblock %}

{% block content %}

<div class="login_form">

  <form method="POST">
    {% csrf_token %}

    <h3>Reset Password</h3>

    <!-- New Password -->
    <div class="input_box">
      <label for="password1">New Password</label>
      <input type="password" name="password1" id="password1" placeholder="Enter new password" required />
    </div>

    <!-- Confirm Password -->
    <div class="input_box">
      <label for="password2">Confirm Password</label>
      <input type="password" name="password2" id="password2" placeholder="Confirm new password" required />
    </div>

    <!-- Button -->
    <button type="submit">Update Password</button>

    <!-- Back to login -->
    <p class="sign_up">
      Back to <a href="{% url 'login' %}">Login</a>
    </p>

  </form>

</div>

{% endblock content %}
