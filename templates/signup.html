{% extends 'base.html' %}
{% load static %}

{% block title %} Signup {% endblock title %}

{% block extra_css %}
<link href="{% static 'css/style.css' %}" rel="stylesheet" />
{% endblock %}

{% block content %}

<div class="login_form">

  <form method="POST">
    {% csrf_token %}

    <h3>Sign up</h3>

    <!-- Username -->
    <div class="input_box">
      <label for="username">Username</label>
      <input type="text" name="username" id="username" placeholder="Enter username" required />
    </div>

    <!-- Email -->
    <div class="input_box">
      <label for="email">Email</label>
      <input type="email" name="email" id="email" placeholder="Enter email address" required />
    </div>

    <!-- Password -->
    <div class="input_box">
      <label for="password1">Password</label>
      <input type="password" name="password1" id="password1" placeholder="Create password" required />
    </div>

    <!-- Button -->
    <button type="submit">Sign Up</button>

    <p class="sign_up">
      Already have an account? <a href="{% url 'login' %}">Login</a>
    </p>

    <!-- Separator -->
    <p class="separator"><span>or</span></p>

    <!-- Social login -->
    <div class="login_option">

      <div class="option">
        <a href="#">
          <img src="{% static 'images/google.png' %}" alt="Google" />
          <span>Google</span>
        </a>
      </div>

      <div class="option">
        <a href="#">
          <img src="{% static 'images/facebook.png' %}" alt="Facebook" />
          <span>Facebook</span>
        </a>
      </div>

    </div>

  </form>

</div>

{% endblock content %}
